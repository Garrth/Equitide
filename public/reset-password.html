<script>
    const SUPABASE_URL = 'https://wjwnutfljzwofhclxefl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0uW8okQkW24Wel3B8r7QPQ_gGlZGbGi';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Hide form until we know token is valid
    document.getElementById('reset-form').style.display = 'none';
    document.getElementById('invalid-state').style.display = 'none';

    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        document.getElementById('reset-form').style.display = 'block';
        document.getElementById('invalid-state').style.display = 'none';
      } else if (event === 'SIGNED_IN' && window.location.hash.includes('type=recovery')) {
        document.getElementById('reset-form').style.display = 'block';
        document.getElementById('invalid-state').style.display = 'none';
      } else if (!session) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-state').style.display = 'block';
      }
    });

    // Fallback — if no auth event fires in 3 seconds, show invalid
    setTimeout(() => {
      if (document.getElementById('reset-form').style.display === 'none' &&
          document.getElementById('invalid-state').style.display === 'none') {
        document.getElementById('invalid-state').style.display = 'block';
      }
    }, 3000);

    function showMsg(text, type) {
      const el = document.getElementById('reset-msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleReset() {
      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;

      if (!password || !confirm) { showMsg('Please fill in both fields.', 'error'); return; }
      if (password.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
      if (password !== confirm) { showMsg('Passwords do not match.', 'error'); return; }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Updating…';

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Update Password';
        showMsg(error.message, 'error');
        return;
      }

      showMsg('Password updated! Redirecting to sign in…', 'success');
      setTimeout(() => { window.location.href = '/login'; }, 2000);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleReset();
    });
  </script>
