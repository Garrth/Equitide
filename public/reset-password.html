<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Equitide — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #1a2744;
      --gold:   #b8972e;
      --gold-lt:#d4af51;
      --slate:  #4a5568;
      --mist:   #f4f6f9;
      --border: #d8dde6;
      --red:    #c0392b;
      --green:  #1a6b3a;
      --white:  #ffffff;
    }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--mist);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: var(--navy);
      display: flex;
      align-items: center;
      padding: 0 2rem;
      z-index: 100;
    }
    .top-bar .wordmark {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.15rem;
      color: var(--white);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .top-bar .wordmark span { color: var(--gold-lt); }
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
      margin-top: 56px;
      box-shadow: 0 2px 12px rgba(26,39,68,0.08);
      animation: fadeUp 0.35s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-header {
      text-align: center;
      margin-bottom: 1.75rem;
    }
    .card-header h1 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.4rem;
      color: var(--navy);
      margin-bottom: 0.25rem;
    }
    .card-header p {
      font-size: 0.82rem;
      color: var(--slate);
    }
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 0.35rem;
    }
    .field input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem;
      color: var(--navy);
      background: var(--white);
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(26,39,68,0.08);
    }
    .field-hint {
      font-size: 0.72rem;
      color: var(--slate);
      margin-top: 0.3rem;
    }
    .btn-primary {
      width: 100%;
      padding: 0.75rem;
      background: var(--navy);
      color: var(--white);
      border: none;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-primary:hover { background: #243660; }
    .btn-primary:disabled { background: #8a9ab5; cursor: not-allowed; }
    .msg {
      border-radius: 3px;
      padding: 0.65rem 0.85rem;
      font-size: 0.82rem;
      margin-bottom: 1rem;
      display: none;
    }
    .msg.error   { background: #fdf0ef; border: 1px solid #e8b4b0; color: var(--red); display: block; }
    .msg.success { background: #edf7f1; border: 1px solid #a8d5bb; color: var(--green); display: block; }
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .card-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.75rem;
      color: #aab0bc;
    }
    .card-footer a { color: var(--slate); text-decoration: none; }
    .card-footer a:hover { text-decoration: underline; }

    /* Invalid link state */
    .invalid-state { text-align: center; }
    .invalid-icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .invalid-state h2 {
      font-family: 'Libre Baskerville', serif;
      font-size: 1.1rem;
      color: var(--navy);
      margin-bottom: 0.5rem;
    }
    .invalid-state p { font-size: 0.85rem; color: var(--slate); line-height: 1.6; margin-bottom: 1.5rem; }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="wordmark">Equitide <span>Investor Portal</span></div>
  </div>

  <div class="card">
    <div class="card-header">
      <h1>Set New Password</h1>
      <p>Choose a strong password for your account.</p>
    </div>

    <!-- Reset form (shown when valid token present) -->
    <div id="reset-form">
      <div class="msg" id="reset-msg"></div>
      <div class="field">
        <label>New Password</label>
        <input type="password" id="new-password" placeholder="Min. 8 characters" autocomplete="new-password" />
        <div class="field-hint">Must be at least 8 characters.</div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <input type="password" id="confirm-password" placeholder="••••••••" autocomplete="new-password" />
      </div>
      <button class="btn-primary" id="reset-btn" onclick="handleReset()">Update Password</button>
    </div>

    <!-- Invalid/expired link state (hidden by default) -->
    <div id="invalid-state" style="display:none;" class="invalid-state">
      <div class="invalid-icon">🔗</div>
      <h2>Link Expired or Invalid</h2>
      <p>This password reset link has expired or already been used. Please request a new one from the login page.</p>
      <a href="/login" class="btn-primary" style="display:inline-block;text-decoration:none;text-align:center;">Back to Sign In</a>
    </div>

    <div class="card-footer">
      <a href="/login">← Back to Sign In</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://wjwnutfljzwofhclxefl.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_0uW8okQkW24Wel3B8r7QPQ_gGlZGbGi';
    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // Supabase sends the token in the URL hash — handle it
    sb.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Valid recovery token — show the form
        document.getElementById('reset-form').style.display = 'block';
        document.getElementById('invalid-state').style.display = 'none';
      }
    });

    // Check on load — if no recovery event fires within a moment, show invalid state
    setTimeout(() => {
      const hash = window.location.hash;
      if (!hash.includes('access_token') && !hash.includes('type=recovery')) {
        document.getElementById('reset-form').style.display = 'none';
        document.getElementById('invalid-state').style.display = 'block';
      }
    }, 500);

    function showMsg(text, type) {
      const el = document.getElementById('reset-msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleReset() {
      const password = document.getElementById('new-password').value;
      const confirm  = document.getElementById('confirm-password').value;

      if (!password || !confirm) {
        showMsg('Please fill in both fields.', 'error');
        return;
      }
      if (password.length < 8) {
        showMsg('Password must be at least 8 characters.', 'error');
        return;
      }
      if (password !== confirm) {
        showMsg('Passwords do not match.', 'error');
        return;
      }

      const btn = document.getElementById('reset-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Updating…';

      const { error } = await sb.auth.updateUser({ password });

      if (error) {
        btn.disabled = false;
        btn.textContent = 'Update Password';
        showMsg(error.message, 'error');
        return;
      }

      showMsg('Password updated successfully! Redirecting to sign in…', 'success');
      setTimeout(() => { window.location.href = '/login'; }, 2000);
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleReset();
    });
  </script>
</body>
</html>
