server {
    server_name wallet.equitide.io;
    root /var/www/wallet.equitide.io;
    index index.html;
    location / {
        try_files $uri $uri.html $uri/ =404;
    }
    location /api/ {
        proxy_pass http://localhost:3001/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/wallet.equitide.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wallet.equitide.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = wallet.equitide.io) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name wallet.equitide.io;
    return 404;
}