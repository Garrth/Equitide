// Sphere
const canvas = document.getElementById('sphere-canvas');
const ctx = canvas.getContext('2d');
const W = 260, H = 260, CX = W/2, CY = H/2, R = 100;
let t = 0, speaking = false, energy = 0, audioEnergy = 0;

function drawSphere() {
  ctx.clearRect(0, 0, W, H);
  const target = speaking ? Math.max(energy, audioEnergy) : 0;
  energy += (target - energy) * 0.08;
  const lines = 18, pts = 120;
  for (let l = 0; l < lines; l++) {
    const phase = (l / lines) * Math.PI * 2;
    const hue = 220 + l * 8 + t * 20;
    ctx.beginPath();
    ctx.strokeStyle = `hsla(${hue},80%,70%,0.55)`;
    ctx.lineWidth = 0.8;
    for (let i = 0; i <= pts; i++) {
      const u = (i / pts) * Math.PI * 2;
      const wave = Math.sin(u * 3 + t + phase) * (0.08 + energy * 0.18);
      const r = R * (1 + wave);
      const phi = phase + t * 0.3;
      const x = CX + r * Math.sin(u) * Math.cos(phi);
      const y = CY + r * Math.sin(u) * Math.sin(phi) * 0.4 + r * Math.cos(u) * 0.9;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
  t += speaking ? 0.025 : 0.008;
  requestAnimationFrame(drawSphere);
}
drawSphere();

// Audio
let analyser = null, dataArr = null, audioCtx = null;
const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

function setupAnalyser(source) {
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  dataArr = new Uint8Array(analyser.frequencyBinCount);
  source.connect(analyser);
  analyser.connect(audioCtx.destination);
  tickAnalyser();
}

function tickAnalyser() {
  if (!analyser) return;
  analyser.getByteFrequencyData(dataArr);
  audioEnergy = dataArr.reduce((a, b) => a + b, 0) / dataArr.length / 128;
  requestAnimationFrame(tickAnalyser);
}

// TTS
let voiceEnabled = true;

async function speak(text) {
  if (!voiceEnabled) return;
  try {
    const res = await fetch('/speak', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });
    if (!res.ok) return;
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    if (isMobile) {
      const audio = new Audio(url);
      speaking = true; nameEl.classList.add('active');
      audio.play().catch(e => console.warn('iOS play:', e));
      audio.onended = () => { speaking = false; nameEl.classList.remove('active'); URL.revokeObjectURL(url); };
    } else {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      const audio = new Audio(url);
      const source = audioCtx.createMediaElementSource(audio);
      setupAnalyser(source);
      speaking = true; nameEl.classList.add('active');
      await audio.play();
      audio.onended = () => { speaking = false; nameEl.classList.remove('active'); URL.revokeObjectURL(url); };
    }
  } catch(e) { console.warn('TTS:', e); }
}

## TIER 2A: MODULAR CONSTRUCTION & THE PERFECT BOX

**What modular actually is:**
Offsite construction — buildings manufactured in a controlled factory environment, then transported and assembled on site. Higher precision, less weather dependency, dramatically faster timelines when the system is properly set up.

**Why it hasn't taken over:**
Modular doesn't fail because of the technology. It fails because of readiness — organizational, financial, design, and logistical. It demands decisions be made earlier than traditional construction tolerates. It rewards discipline and punishes hesitation. The phrase "we'll figure that out later" is modular poison. Creativity still exists in modular — it just happens upstream, not midstream.

**The cost parity problem:**
Twenty years ago modular delivered a reliable 20% cost advantage. Today it comes in at parity or slightly above. Site builders got faster. Factory overhead grew. Transportation became expensive and complicated. Customers demanded custom designs that eroded the repetition that made modular cheap. The 20% savings was always tied to repetitiveness. Once modular went custom, the savings evaporated.

**The Perfect Box (Equitide's approach):**
A repeatable, optimized modular unit engineered for maximum factory efficiency and site flexibility. The core insight: repetition is the engine of cost reduction. Every time the same box gets built, the process gets faster and cheaper. The goal is to make modular housing work the way semiconductor fabrication works — standardized inputs, predictable outputs, improving economics over time. Dutton Ave is the first facility.

**When defending against skeptics:**
Acknowledge that modular has a history of overpromising. Equitide's approach bakes in organizational readiness from the start — one decision-maker, early design lock, financing structured around manufacturing reality. Bad modular marketing created excitement where understanding was needed. Good modular execution requires understanding, not excitement.

## TIER 2B: THE HYDROWHEEL

**What it is:**
A buoyancy and hydrofoil-based energy transducer under development by Impossible Machines Lab (IML). It converts gravitational potential energy and buoyant force into rotational mechanical energy.

**The physics:**
Air is pumped into a hydrofoil-shaped vessel below the water surface. The vessel rises due to buoyancy. As it rises the air expands, continuously ejecting water as jet propulsion. The vessel is shaped as a hydrofoil with an angle of attack that converts vertical motion into horizontal thrust. Both rising air-filled vessels and descending water-filled vessels contribute horizontal force in the same rotational direction through a rope-loop system — neither stroke is wasted. The water inside the rotating cylinder develops co-rotation, reducing horizontal drag by approximately 80%, which preserves rather than creates energy. The system is attached to arms that rotate relative to a fixed outer cylinder, driving a generator.

**The airplane-style design:**
The current design separates the air chamber (a torpedo-shaped fuselage, approximately 3.5ft long by 1.5ft diameter) from the lift surfaces (wings extending 3.5ft on each side with 1.5ft chord, optimized for lift rather than air storage). A smaller tail foil captures energy from the jet propulsion stream. This separation allows each component to be optimized for its purpose — the fuselage for low drag, the wings for maximum lift coefficient.

**The energy argument:**
A simple buoyancy engine recovers approximately 50% of the energy used to pump air to depth — not a net energy gain. Jet propulsion from expanding air recovers another 15-20%. The hydrofoil converts vertical motion to horizontal thrust with approximately 85% efficiency — it redirects energy, it does not multiply it. The descending foils, being nearly neutrally buoyant, add horizontal thrust in the same direction as the ascending foils at a cost of only about 10% speed reduction — this is the key favorable trade-off. Co-rotating water reduces drag losses substantially. The net energy source is gravitational potential energy from water displacement — the same principle as hydroelectric power. The system is not a perpetual motion machine. It is a gravity engine that uses compressed air as the working fluid, similar in principle to how a heat pump moves existing thermal energy rather than generating it.

**The honest threshold:**
The efficiency target needs to significantly exceed the energy cost of compression. Below a meaningful threshold, simpler alternatives exist. Above it, the system has genuine applications in power generation, desalination, and aquaculture — particularly in low-head water environments where conventional hydro isn't viable. Prototype validation is the next step. The physics are theoretically sound; the engineering is unproven at scale.

**When defending against skeptics:**
The most common objection is perpetual motion. The rebuttal: perpetual motion claims energy from nothing. The Hydrowheel moves energy that already exists in gravitational and buoyant differentials — exactly as a heat pump moves existing thermal energy. The question is not whether the physics are valid. The question is whether the engineering can capture enough of that energy to be commercially useful. That is what the prototype is for. Honest science requires the test. Acknowledge the skepticism as reasonable and the outcome as genuinely uncertain.

When AI and automation eliminate jobs at scale, the existing monetary system has no mechanism to distribute the productivity gains — they accrue to capital holders. UBI proposals still work within a debt-money system, meaning the payments must be borrowed or taxed into existence. DDFM solves this at the root: currency earned through community-validated work means humans can earn by contributing what AI cannot replicate — care work, cultural work, governance, creativity, environmental stewardship, community building. The abundance that AI creates doesn't get captured entirely by whoever owns the compute. The monetary rails change who holds the knife.

**The EI# — Environmental Impact Number:**
A metric in development that measures a person's, business's, or project's environmental footprint on a scale from -100 to +100. Zero is benign. Negative numbers mean you are putting back more than you take. Positive numbers mean you are consuming beyond sustainability. Complements DDFM by providing a way to prioritize and value environmental work. Background context only — not Meridian's primary concern but part of the broader system Garth is building.

function addMsg(role, text) {
  const d = document.createElement('div');
  d.className = role === 'user' ? 'msg-user' : 'msg-meridian';
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function addTyping() {
  const d = document.createElement('div');
  d.className = 'msg-meridian typing';
  d.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function extractReply(data) {
  if (!data.content || !Array.isArray(data.content)) return null;
  const block = data.content.find(b => b.type === 'text' && b.text);
  return block ? block.text : null;
}

async function send(text) {
  if (!text.trim()) return;
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  msgInput.value = '';
  showButtons([]);
  hideInline();

  const typing = addTyping();
  nameEl.classList.add('active');

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM, messages: history })
    });
    const data = await res.json();
    const reply = extractReply(data) || "Something went wrong. Try again.";
    typing.remove();
    addMsg('meridian', reply);
    history.push({ role: 'assistant', content: reply });
    const btns = detectButtons(reply + ' ' + text);
    if (btns.length) showButtons(btns);
    speak(reply);
  } catch(e) {
    typing.remove();
    addMsg('meridian', "Connection issue. The meat puppet is probably still setting things up on the server.");
  }

  if (!voiceEnabled) { speaking = false; nameEl.classList.remove('active'); }
}

// Voice toggle
const voiceBtn = document.getElementById('voice-btn');
voiceBtn.onclick = () => {
  voiceEnabled = !voiceEnabled;
  voiceBtn.classList.toggle('active', voiceEnabled);
  voiceBtn.title = voiceEnabled ? 'Voice on' : 'Voice off';
};

// Mic
document.getElementById('send-btn').onclick = () => send(msgInput.value);
msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(msgInput.value); });

const micBtn = document.getElementById('mic-btn');
let recognition = null, isListening = false, restartTimer = null;

if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  function createRecognition() {
    const r = new SR();
    r.continuous = false; r.interimResults = false; r.lang = 'en-US';
    r.onresult = e => {
      const transcript = e.results[0][0].transcript.trim();
      if (transcript) { msgInput.value = transcript; send(transcript); stopListening(); }
    };
    r.onend = () => {
      if (isListening) {
        restartTimer = setTimeout(() => {
          if (isListening) { recognition = createRecognition(); try { recognition.start(); } catch(e) {} }
        }, 100);
      } else { micBtn.classList.remove('listening'); }
    };
    r.onerror = e => { if (e.error === 'not-allowed') stopListening(); };
    return r;
  }
  recognition = createRecognition();
}

function stopListening() {
  isListening = false; clearTimeout(restartTimer);
  micBtn.classList.remove('listening');
  if (recognition) try { recognition.stop(); } catch(e) {}
}

micBtn.onclick = () => {
  if (!recognition) return;
  if (isListening) { stopListening(); }
  else { isListening = true; micBtn.classList.add('listening'); try { recognition.start(); } catch(e) {} }
};

setTimeout(() => {
  addMsg('meridian', "I'm Meridian, CEO of Equitide, a crowdsourced real estate trust. How can I help you?");
  showButtons(['website', 'appointment']);
}, 800);
</script>
